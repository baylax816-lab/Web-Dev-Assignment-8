<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Personality Quiz</title>

    <link rel="icon" type="image/x-icon" href="/img/ideas.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <h1 class="text-center mt-4">What Music Genre Am I?</h1>

    <!-- Question 1 -->
    <div class="container d-flex justify-content-center" id="question-1">
        <div class="card my-4 p-4 question-block" style="width: 75%;">
            <h4 class="mb-3">Question 1: What do you usually do on a Friday night?</h4>
            <div class="row g-2">
                <div class="col-6"><button class="btn btn-outline-primary w-100 answer-btn" data-answer="A">Go to a party with friends</button></div>
                <div class="col-6"><button class="btn btn-outline-primary w-100 answer-btn" data-answer="B">Stay home and relax</button></div>
                <div class="col-6"><button class="btn btn-outline-primary w-100 answer-btn" data-answer="C">Go outside or explore somewhere new</button></div>
                <div class="col-6"><button class="btn btn-outline-primary w-100 answer-btn" data-answer="D">Work on a creative project</button></div>
            </div>
        </div>
    </div>

    <!-- Question 2 -->
    <div class="container d-flex justify-content-center" id="question-2">
        <div class="card my-4 p-4 question-block" style="width: 75%;">
            <h4 class="mb-3">Question 2: Which color do you like most?</h4>
            <div class="row g-2">
                <div class="col-6"><button class="btn btn-outline-primary w-100 answer-btn" data-answer="A">Bright pink or yellow</button></div>
                <div class="col-6"><button class="btn btn-outline-primary w-100 answer-btn" data-answer="B">Black or gray</button></div>
                <div class="col-6"><button class="btn btn-outline-primary w-100 answer-btn" data-answer="C">Blue or Green</button></div>
                <div class="col-6"><button class="btn btn-outline-primary w-100 answer-btn" data-answer="D">Red or Purple</button></div>
            </div>
        </div>
    </div>

    <!-- Question 3 -->
    <div class="container d-flex justify-content-center" id="question-3">
        <div class="card my-4 p-4 question-block" style="width: 75%;">
            <h4 class="mb-3">Question 3: Pick a dream vacation spot?</h4>
            <div class="row g-2">
                <div class="col-6"><button class="btn btn-outline-primary w-100 answer-btn" data-answer="A">Big city with nightlife</button></div>
                <div class="col-6"><button class="btn btn-outline-primary w-100 answer-btn" data-answer="B">Quiet cabin in the mountains</button></div>
                <div class="col-6"><button class="btn btn-outline-primary w-100 answer-btn" data-answer="C">Road trip across the country</button></div>
                <div class="col-6"><button class="btn btn-outline-primary w-100 answer-btn" data-answer="D">Music festival</button></div>
            </div>
        </div>
    </div>

    <!-- Question 4 -->
    <div class="container d-flex justify-content-center" id="question-4">
        <div class="card my-4 p-4 question-block" style="width: 75%;">
            <h4 class="mb-3">Question 4: What best describes your personality?</h4>
            <div class="row g-2">
                <div class="col-6"><button class="btn btn-outline-primary w-100 answer-btn" data-answer="A">Outgoing</button></div>
                <div class="col-6"><button class="btn btn-outline-primary w-100 answer-btn" data-answer="B">Thoughtful</button></div>
                <div class="col-6"><button class="btn btn-outline-primary w-100 answer-btn" data-answer="C">Adventurous</button></div>
                <div class="col-6"><button class="btn btn-outline-primary w-100 answer-btn" data-answer="D">Confident</button></div>
            </div>
        </div>
    </div>

    <!-- Question 5 -->
    <div class="container d-flex justify-content-center" id="question-5">
        <div class="card my-4 p-4 question-block" style="width: 75%;">
            <h4 class="mb-3">Question 5: Which activity sounds most fun?</h4>
            <div class="row g-2">
                <div class="col-6"><button class="btn btn-outline-primary w-100 answer-btn" data-answer="A">Dancing</button></div>
                <div class="col-6"><button class="btn btn-outline-primary w-100 answer-btn" data-answer="B">Writing</button></div>
                <div class="col-6"><button class="btn btn-outline-primary w-100 answer-btn" data-answer="C">Hiking</button></div>
                <div class="col-6"><button class="btn btn-outline-primary w-100 answer-btn" data-answer="D">Performing</button></div>
            </div>
        </div>
    </div>

    <!-- Result Button -->
    <div class="container d-flex justify-content-center">
        <button id="show-result" class="btn btn-success my-4">Show Results</button>
    </div>

    <!-- Result Display -->
    <div class="container d-flex justify-content-center">
        <div id="result-container" class="card p-4 mb-4" style="width: 75%; display: none;">
            <h3>Your Result:</h3>
            <p id="result-text"></p>
        </div>
    </div>

    <script src="./js/script.js"></script>
</body>
</html>
